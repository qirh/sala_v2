name: tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Cancel earlier in-progress runs when new commits come in on the same PR/branch.
concurrency:
  group: tests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  # Sticky PR comment writes; checkout reads.
  pull-requests: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium (cold cache)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps (warm cache)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # --- Suite 1: type-check (svelte-check) -------------------------------
      - name: Type-check
        id: check
        continue-on-error: true
        run: npm run check

      # --- Suite 2: functional ----------------------------------------------
      # Playwright's webServer auto-spawns vite preview (with the inline
      # PUBLIC_BUILD_TIMESTAMP_UTC env var prefix; see playwright.config.js).
      - name: Functional tests
        id: functional
        continue-on-error: true
        run: npm test

      # --- Suite 3: parity (HTTP mode) --------------------------------------
      # HTTP-mode compares status, Location, Content-Type, and Link headers
      # between production saleh.sh and this PR's build. Catches regressions
      # in the 8 Netlify redirects (/cv, /resume, /spider-man, /spiderman,
      # /address, /sunnyside, /blog, /posts) plus sitemap.xml/robots.txt.
      #
      # Content-mode is intentionally skipped: production is currently Vue 2
      # (JS-rendered, plain fetch returns the noscript shell) while the
      # SvelteKit preview is prerendered. They'd diff meaninglessly. Switch
      # to --mode=all once SvelteKit is on prod.
      - name: Build for parity
        run: PUBLIC_BUILD_TIMESTAMP_UTC=$(date -u +%FT%TZ) npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 127.0.0.1 --port 8080 > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              echo "preview ready"
              exit 0
            fi
            sleep 1
          done
          echo "preview server did not come up:" >&2
          cat /tmp/preview.log >&2
          exit 1

      - name: Parity HTTP-mode (vs production)
        id: parity
        continue-on-error: true
        env:
          PREVIEW_URL: http://127.0.0.1:8080
        run: npm run test:parity -- --mode=http

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/preview.pid ]; then
            kill "$(cat /tmp/preview.pid)" 2>/dev/null || true
          fi

      # --- Suite 4: visual regression ---------------------------------------
      # Committed baselines are macOS-only. Capture fresh Linux baselines
      # from production at test time, then run visual against a
      # Playwright-spawned local preview built from this PR. Match = "this
      # PR renders identically to current production on Linux/Chromium."
      #
      # NOTE: pre-SvelteKit-cutover, prod is Vue 2 and the PR is SvelteKit,
      # so this suite is expected to FAIL on the rewrite branch. Once
      # SvelteKit ships to prod, both sides match and visual becomes
      # actionable signal.
      - name: Capture Linux visual baselines from production
        run: npm run test:visual:update

      - name: Visual regression (PR preview vs prod baselines)
        id: visual
        continue-on-error: true
        run: npm run test:visual

      # --- Artifacts --------------------------------------------------------
      - name: Upload Playwright report
        if: |
          steps.check.outcome == 'failure' ||
          steps.functional.outcome == 'failure' ||
          steps.parity.outcome == 'failure' ||
          steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

      # --- PR sticky comment ------------------------------------------------
      # The `header:` field identifies the comment for in-place updates —
      # subsequent runs edit the same comment instead of appending new ones.
      - name: Comment results on PR
        if: github.event_name == 'pull_request' && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tests
          message: |
            ## Test results

            **Commit:** `${{ github.event.pull_request.head.sha }}`

            | Suite | Result |
            |---|---|
            | Type-check (svelte-check) | ${{ steps.check.outcome == 'success' && '✅ pass' || '❌ fail' }} |
            | Functional | ${{ steps.functional.outcome == 'success' && '✅ pass' || '❌ fail' }} |
            | Parity HTTP (vs prod) | ${{ steps.parity.outcome == 'success' && '✅ pass' || '❌ fail' }} |
            | Visual regression (vs prod) | ${{ steps.visual.outcome == 'success' && '✅ pass' || '❌ fail' }} |

            [Full run details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Fail job if any suite failed
        if: |
          steps.check.outcome != 'success' ||
          steps.functional.outcome != 'success' ||
          steps.parity.outcome != 'success' ||
          steps.visual.outcome != 'success'
        run: |
          echo "::error::At least one suite failed"
          echo "  check:      ${{ steps.check.outcome }}"
          echo "  functional: ${{ steps.functional.outcome }}"
          echo "  parity:     ${{ steps.parity.outcome }}"
          echo "  visual:     ${{ steps.visual.outcome }}"
          exit 1
