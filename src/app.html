    <script>
        window.__salehKeyBuffer = {
            pending: [],
            capture(event) {
                window.__salehKeyBuffer.pending.push(event.key);
                if (window.__salehKeyBuffer.pending.length > 32) {
                    window.__salehKeyBuffer.pending.shift();
                }
            }
        };
        window.addEventListener('keyup', window.__salehKeyBuffer.capture, true);
    </script>
    %sveltekit.head%
</head>
